# config.yaml - Configuration Example
# ============================================================
# Binance Options-Driven Futures Signal Generator
# Optimized for Intraday Trading
# ============================================================
#
# Copy this file to config.yaml and update with your credentials

# ============================================================
# BINANCE API CONFIGURATION
# ============================================================
# Uses official Binance Connector Python SDK
# GitHub: https://github.com/binance/binance-connector-python
binance:
  # API credentials (use environment variables for security)
  api_key: ${BINANCE_API_KEY}
  api_secret: ${BINANCE_API_SECRET}
  
  # Use testnet for development (set BINANCE_USE_TESTNET=true)
  testnet: false
  
  # Rate limiting (SDK handles this, but these are override limits)
  rate_limit:
    requests_per_second: 10
    burst: 20
  
  # Timeouts
  timeout:
    connect_seconds: 10
    read_seconds: 30

# ============================================================
# ADAPTIVE ASSET RANKING
# ============================================================
ranking:
  # Asset selection
  top_assets_count: 5            # Select top N assets by activity
  min_activity_score: 0.15       # Minimum score to be considered (lowered from 0.30)
  
  # Activity scoring weights
  scoring_weights:
    oi_change: 0.25              # OI momentum weight
    volume_spike: 0.20           # Volume spike weight
    iv_interest: 0.15            # IV percentile weight
    pcr_extreme: 0.15            # PCR extremeness weight
    whale_activity: 0.15         # Whale activity weight
    total_volume: 0.10           # Total volume weight
  
  # Thresholds for scoring
  thresholds:
    oi_change_max_pct: 20.0      # 20% OI change = max score
    volume_spike_max: 5.0        # 5x avg volume = max score
    total_volume_max: 100000000  # $100M volume = max score
  
  # Liquidity requirements for selection
  min_options_volume: 100000     # Min $100K options volume (lowered from $5M)
  min_active_strikes: 5          # Min strikes with OI (lowered from 10)
  
  # Exclusions
  excluded_symbols: []           # Symbols to never select

# ============================================================
# PIPELINE CONFIGURATION
# ============================================================
pipeline:
  # Timeouts (single execution)
  # Note: Scheduling is handled externally via cronjob
  timeout:
    total_seconds: 600           # Total pipeline timeout
    activity_scan_seconds: 30    # Stage 1: Activity scan
    asset_selection_seconds: 10  # Stage 2: Asset selection
    data_fetch_seconds: 120      # Stage 3: Data fetch
    analysis_seconds: 180        # Stage 4: Analysis
    whale_wall_seconds: 60       # Stage 5: Whale + Wall detection
    signal_output_seconds: 60    # Stage 6: Signal output

# ============================================================
# INTRADAY CONFIGURATION (15-min Trading System)
# ============================================================
intraday:
  enabled: true                  # Enable intraday mode
  oi_period: "15m"               # 15-min OI data
  oi_limit: 96                   # 24 hours of 15-min candles
  volume_interval: "15m"         # 15-min volume data
  volume_limit: 48               # 12 hours for avg comparison
  kline_interval: "15m"          # 15-min klines
  kline_limit: 48                # 12 hours of candles
  scoring_mode: "intraday"       # "intraday" or "daily"
  execution_interval_minutes: 15 # Run every 15 minutes

# ============================================================
# WHALE DETECTION
# ============================================================
whale:
  # Default thresholds (used when no asset-specific threshold)
  # Adjusted to match actual Binance Options block trade data
  min_premium: 500               # $500 = minimum trade to analyze
  block_threshold: 5000          # $5k = large trade (top ~10%)
  lookback_hours: 24             # Hours to look back for whale activity
  
  # Asset-specific thresholds (scale by asset price/liquidity)
  # Based on observed trade distributions from Binance API
  asset_thresholds:
    BTCUSDT:
      min_premium: 500           # $500 minimum for BTC (lowered from $1k)
      block_threshold: 5000      # $5k = large block trade for BTC (lowered from $10k)
    ETHUSDT:
      min_premium: 250           # $250 minimum for ETH (lowered from $500)
      block_threshold: 2500      # $2.5k = large block trade for ETH (lowered from $5k)
    SOLUSDT:
      min_premium: 100           # $100 minimum for SOL (lowered from $250)
      block_threshold: 1000      # $1k = large block trade for SOL (lowered from $2.5k)
    BNBUSDT:
      min_premium: 100           # $100 minimum for BNB (lowered from $250)
      block_threshold: 1000      # $1k = large block trade for BNB (lowered from $2.5k)
    DOGEUSDT:
      min_premium: 50            # $50 minimum for DOGE (lowered from $100)
      block_threshold: 500       # $500 = large block trade for DOGE (lowered from $1k)
    XRPUSDT:
      min_premium: 50            # $50 minimum for XRP (lowered from $100)
      block_threshold: 500       # $500 = large block trade for XRP (lowered from $1k)
  
  # Confidence boost settings
  confidence_boost:
    enabled: true
    max_boost: 0.15              # Max 15% confidence boost
    net_volume_threshold: 50000 # $100k net = max boost (adjusted for actual data)

# ============================================================
# WALL DETECTION
# ============================================================
walls:
  # Detection parameters
  min_oi_percentage: 0.05        # 5% of total OI = wall (lowered from 15%)
  major_threshold: 0.15          # 15% = major wall (lowered from 25%)
  max_levels: 3                  # Max S/R levels to output
  
  # Wall strength calculation
  strength:
    distance_factor: 0.30        # Weight for distance from spot
    oi_factor: 0.70              # Weight for OI concentration

# ============================================================
# OPTIONS ANALYSIS
# ============================================================
analysis:
  # IV (Implied Volatility) Analysis
  iv:
    enabled: true
    weight: 0.20
    lookback_days: 30
    # Percentile thresholds (for IV percentile ranking)
    thresholds:
      high: 0.75                 # 75th percentile = high IV
      low: 0.25                  # 25th percentile = low IV
    # Value thresholds (annualized IV values)
    value_thresholds:
      high: 0.80                 # 80% annualized = high IV
      low: 0.30                  # 30% annualized = low IV
    # ATM range for IV calculation
    atm_range_pct: 5.0           # 5% from spot price
    # Minimum strikes for valid analysis
    min_strikes: 3               # Minimum strikes required
  
  # PCR Analysis
  pcr:
    enabled: true
    weight: 0.25
    thresholds:
      put_high: 1.2
      call_high: 0.8
    weighting:
      volume_weight: 0.6
      oi_weight: 0.4
    # PCR Analyzer Config (pcr_analyzer.py)
    analyzer:
      pcr_high_threshold: 1.2        # Put-heavy
      pcr_low_threshold: 0.8         # Call-heavy
      pcr_extreme_high: 1.5          # Very put-heavy
      pcr_extreme_low: 0.5           # Very call-heavy
      volume_weight: 0.4             # 40% notional PCR, 60% OI PCR
      min_total_oi: 100              # Minimum OI for valid analysis
  
  # Open Interest
  oi:
    enabled: true
    weight: 0.20
    concentration_threshold: 0.15
    # OI Analyzer Config (oi_analyzer.py)
    analyzer:
      high_oi_concentration: 0.04    # 4% of total OI at one strike
      significant_oi_change: 0.20    # 20% change is significant
      max_strikes_to_analyze: 50
      min_total_oi: 100
  
  # Max Pain
  max_pain:
    enabled: true
    weight: 0.15
    distance_threshold: 2.0
    # Max Pain Analyzer Config (max_pain.py)
    analyzer:
      distance_threshold: 3.0        # 3% from max pain
      expiry_weight_factor: 1.0      # Weight by days to expiry
      min_strikes: 3
  
  # Sentiment Analysis (L/S Ratios + Funding Rate)
  sentiment:
    enabled: true
    weight: 0.20                  # Weight in signal scoring
    
    # L/S Ratio thresholds
    ls_ratio_extreme_high: 2.0    # > 2.0 = extreme bullish (contrarian short)
    ls_ratio_extreme_low: 0.5     # < 0.5 = extreme bearish (contrarian long)
    ls_ratio_bullish: 1.2         # > 1.2 = bullish
    ls_ratio_bearish: 0.8         # < 0.8 = bearish
    
    # Funding rate thresholds (in decimal)
    funding_extreme_high: 0.0005  # > 0.05% = extremely long
    funding_extreme_low: -0.0005  # < -0.05% = extremely short
    funding_bullish: 0.0001       # > 0.01% = long bias
    funding_bearish: -0.0001      # < -0.01% = short bias
    
    # Lookback periods
    ls_ratio_lookback_periods: 5  # Periods to analyze trend
    funding_rate_lookback_hours: 168  # 7 days for average
    
    # Weights for combined sentiment
    top_trader_position_weight: 0.35  # Position size L/S ratio
    top_trader_account_weight: 0.25   # Account count L/S ratio
    funding_rate_weight: 0.40         # Funding rate history
    
    # Contrarian mode
    use_contrarian_signals: true
    contrarian_extreme_threshold: 3.0  # L/S ratio > 3.0 = strong contrarian

# ============================================================
# FUTURES VALIDATION
# ============================================================
validation:
  liquidity:
    enabled: true
    min_24h_volume: 1000000      # Min $1M 24h volume
  
  trend:
    enabled: true
    ema_fast: 9
    ema_slow: 21
    require_alignment: true
  
  volatility:
    enabled: true
    atr_period: 14
    extreme_multiplier: 3.0
  
  funding:
    enabled: true
    max_absolute_rate: 0.001     # 0.1%

# ============================================================
# SIGNAL OUTPUT
# ============================================================
output:
  # JSON Output (Primary)
  json:
    enabled: true                # Output JSON to stdout
    pretty_print: false          # Compact JSON
    include_metadata: true
    include_selected_assets: true
  
  # Signal filtering
  signals:
    min_confidence: 0.30         # Lowered from 0.55 to allow more signals
    max_per_asset: 1
    max_per_execution: 5
    min_risk_reward: 1.5
  
  # S/R Levels
  sr_levels:
    max_levels: 3
    include_max_pain: true
    min_wall_strength: 0.50
  
  # Stop Loss
  stop_loss:
    method: "wall"
    wall_based:
      use_nearest_wall: true
      buffer_pct: 0.2
    min_distance_pct: 0.5
    max_distance_pct: 3.0
  
  # Take Profit
  take_profit:
    levels: 3
    ratios:
      level_1: 0.5
      level_2: 0.3
      level_3: 0.2
    wall_based:
      tp1: "nearest_wall"
      tp2: "second_wall"
      tp3: "third_wall"
  
  # Database (Secondary)
  database:
    enabled: true
    path: "./data/signals.db"
    rotation: "weekly"
    retention_weeks: 4

# ============================================================
# LOGGING
# ============================================================
logging:
  level: "INFO"
  format: "json"
  
  file:
    enabled: true
    path: "./logs/signal_generator.log"
    max_size_mb: 10
    backup_count: 5
  
  console:
    enabled: false               # Disable console (JSON to stdout)
    colorize: false
  
  mask_sensitive: true

# ============================================================
# ORCHESTRATOR CONFIG (orchestrator.py)
# ============================================================
orchestrator:
  # Timing
  timeout_seconds: 600
  activity_scan_timeout: 60
  data_fetch_timeout: 180
  analysis_timeout: 180
  
  # Asset selection
  top_n_assets: 5
  min_activity_score: 0.30
  
  # Signal generation
  min_signal_confidence: 0.50
  max_signals_per_run: 5
  
  # Signal strength thresholds (confidence levels)
  signal_strength_very_strong: 0.80   # >= 80% confidence
  signal_strength_strong: 0.65        # >= 65% confidence
  signal_strength_moderate: 0.50      # >= 50% confidence
  
  # OI flow thresholds (for OI change detection)
  oi_threshold_daily: 2.0             # ±2% for daily mode
  oi_threshold_intraday: 1.0          # ±1% for intraday mode
  
  # Technical analysis defaults
  atr_fallback_pct: 0.5               # ATR fallback when no data available
  max_level_distance_pct: 5.0         # Max distance for S/R levels from spot
  max_tp_distance_pct: 5.0            # Max TP distance for intraday
  
  # Output
  output_to_stdout: true
  save_to_database: false

# ============================================================
# ASSET SELECTOR CONFIG (asset_selector.py)
# ============================================================
asset_selector:
  top_n: 5
  min_activity_score: 0.15
  min_options_volume: 100000      # $100K minimum
  min_active_strikes: 5
  excluded_symbols: []             # Symbols to never select

# ============================================================
# WHALE DETECTOR CONFIG (whale_detector.py)
# ============================================================
whale_detector:
  min_premium: 100000              # $100k for regular whale
  block_threshold: 500000          # $500k for block trade
  lookback_hours: 24
  min_trades_for_analysis: 3
  bullish_threshold: 0.3           # 30% net bullish = bullish
  bearish_threshold: -0.3          # 30% net bearish = bearish

# ============================================================
# VOLUME ANALYZER CONFIG (volume_analyzer.py)
# ============================================================
volume_analyzer:
  time_buckets: 4                  # Divide lookback into 4 buckets
  high_concentration_threshold: 0.3  # 30% at one strike

# ============================================================
# S/R LEVELS CONFIG (sr_levels.py)
# ============================================================
sr_levels:
  max_support_levels: 3
  max_resistance_levels: 3
  min_level_distance_pct: 1.0      # Minimum distance between levels
  wall_weight: 0.50
  max_pain_weight: 0.30
  volume_weight: 0.20
  default_sl_distance_pct: 2.0
  default_tp_ratios: [1.5, 3.0, 5.0]

# ============================================================
# ACTIVITY SCORER CONFIG (activity_scorer.py)
# ============================================================
activity_scorer:
  weights:
    oi_change: 0.25
    volume_spike: 0.20
    iv_interest: 0.15
    pcr_extreme: 0.15
    whale_activity: 0.15
    total_volume: 0.10
  thresholds:
    oi_change_max: 20.0            # 20% OI change = max score
    volume_spike_max: 5.0          # 5x avg volume = max score
    total_volume_max: 10000000     # $10M volume = max score

# ============================================================
# WALL DETECTOR CONFIG (wall_detector.py)
# ============================================================
wall_detector:
  min_oi_concentration: 0.002      # 0.2% of total OI
  major_wall_concentration: 0.01   # 1% of total OI
  max_wall_distance: 15.0          # 15% from spot
  min_absolute_oi: 10

# ============================================================
# GAMMA EXPOSURE CONFIG (gamma_exposure.py)
# ============================================================
gamma_exposure:
  significant_level_threshold: 0.05  # 5% of total
  min_oi_threshold: 10
  flip_search_range: 0.30          # ±30% from spot
  use_simplified_delta: true
  dte_reference_days: 7.0
  max_dte_weight: 3.0
  min_dte_weight: 0.3
  enable_dte_weighting: true

# ============================================================
# SIGNAL SCORER CONFIG (signal_scorer.py)
# ============================================================
signal_scorer:
  # Core weights for each signal type
  iv_weight: 0.15
  pcr_weight: 0.18
  oi_weight: 0.15
  max_pain_weight: 0.10
  sentiment_weight: 0.16
  gamma_weight: 0.10
  # Advanced metrics weights
  oi_flow_weight: 0.12
  wall_concentration_weight: 0.04
  pcr_strike_alignment_weight: 0.08
  whale_flow_weight: 0.05
  # Thresholds
  min_confidence: 0.4
  agreement_threshold: 0.6
  iv_high_value: 0.80
  iv_low_value: 0.40

# ============================================================
# NOTE: External Components
# ============================================================
# Scheduling: Handled externally via cronjob or task scheduler
# Example: */15 * * * * cd /path/to/project && ./venv/bin/python -m binance_signal_generator
#
# Notifications: Handled externally by reading JSON output
# Example: python -m binance_signal_generator | your_notification_script.sh
