# config.yaml - Configuration Example
# ============================================================
# Binance Options-Driven Futures Signal Generator
# Optimized for Intraday Trading
# ============================================================
#
# Copy this file to config.yaml and update with your credentials

# ============================================================
# BINANCE API CONFIGURATION
# ============================================================
# Uses official Binance Connector Python SDK
# GitHub: https://github.com/binance/binance-connector-python
binance:
  # API credentials (use environment variables for security)
  api_key: ${BINANCE_API_KEY}
  api_secret: ${BINANCE_API_SECRET}
  
  # Use testnet for development (set BINANCE_USE_TESTNET=true)
  testnet: false
  
  # Rate limiting (SDK handles this, but these are override limits)
  rate_limit:
    requests_per_second: 10
    burst: 20
  
  # Timeouts
  timeout:
    connect_seconds: 10
    read_seconds: 30

# ============================================================
# ADAPTIVE ASSET RANKING
# ============================================================
ranking:
  # Asset selection
  top_assets_count: 5            # Select top N assets by activity
  min_activity_score: 0.15       # Minimum score to be considered (lowered from 0.30)
  
  # Activity scoring weights
  scoring_weights:
    oi_change: 0.25              # OI momentum weight
    volume_spike: 0.20           # Volume spike weight
    iv_interest: 0.15            # IV percentile weight
    pcr_extreme: 0.15            # PCR extremeness weight
    whale_activity: 0.15         # Whale activity weight
    total_volume: 0.10           # Total volume weight
  
  # Thresholds for scoring
  thresholds:
    oi_change_max_pct: 20.0      # 20% OI change = max score
    volume_spike_max: 5.0        # 5x avg volume = max score
    total_volume_max: 100000000  # $100M volume = max score
  
  # Liquidity requirements for selection
  min_options_volume: 100000     # Min $100K options volume (lowered from $5M)
  min_active_strikes: 5          # Min strikes with OI (lowered from 10)
  
  # Exclusions
  excluded_symbols: []           # Symbols to never select

# ============================================================
# PIPELINE CONFIGURATION
# ============================================================
pipeline:
  # Timeouts (single execution)
  # Note: Scheduling is handled externally via cronjob
  timeout:
    total_seconds: 600           # Total pipeline timeout
    activity_scan_seconds: 30    # Stage 1: Activity scan
    asset_selection_seconds: 10  # Stage 2: Asset selection
    data_fetch_seconds: 120      # Stage 3: Data fetch
    analysis_seconds: 180        # Stage 4: Analysis
    whale_wall_seconds: 60       # Stage 5: Whale + Wall detection
    signal_output_seconds: 60    # Stage 6: Signal output

# ============================================================
# WHALE DETECTION
# ============================================================
whale:
  # Default thresholds (used when no asset-specific threshold)
  min_premium: 100000            # $100k = default whale trade threshold
  block_threshold: 500000        # $500k = default block trade threshold
  lookback_hours: 24             # Hours to look back for whale activity
  
  # Asset-specific thresholds (higher for larger assets)
  # Adjust thresholds based on asset liquidity and typical trade sizes
  asset_thresholds:
    BTCUSDT:
      min_premium: 500000        # $500k for BTC (larger trades common)
      block_threshold: 2000000   # $2M for BTC block trades
    ETHUSDT:
      min_premium: 200000        # $200k for ETH
      block_threshold: 1000000   # $1M for ETH block trades
    SOLUSDT:
      min_premium: 100000        # $100k for SOL
      block_threshold: 500000    # $500k for SOL block trades
    # Other assets use defaults
  
  # Confidence boost settings
  confidence_boost:
    enabled: true
    max_boost: 0.15              # Max 15% confidence boost
    net_volume_threshold: 20000000  # $20M net = max boost

# ============================================================
# INTRADAY DATA SETTINGS (for 15-min trading system)
# ============================================================
intraday:
  # Enable intraday mode for more responsive signals
  enabled: true
  
  # OI settings - 15m intervals for intraday momentum
  oi_period: "15m"              # Options: "5m", "15m", "30m", "1h", "1d"
  oi_limit: 96                   # 96 candles = 24 hours of 15-min data
  
  # Volume settings - for intraday volume spike detection
  volume_interval: "15m"         # Options: "5m", "15m", "30m", "1h", "1d"
  volume_limit: 48               # 48 candles = 12 hours for comparison
  
  # Price action settings
  kline_interval: "15m"          # For entry timing
  kline_limit: 48                # 12 hours of candles
  
  # Scoring mode
  # "intraday": Uses 15m data for OI/volume scoring (more responsive)
  # "daily": Uses daily data for OI/volume scoring (more stable)
  scoring_mode: "intraday"
  
  # Execution interval (how often the system runs)
  execution_interval_minutes: 15

# ============================================================
# WALL DETECTION
# ============================================================
walls:
  # Detection parameters
  min_oi_percentage: 0.05        # 5% of total OI = wall (lowered from 15%)
  major_threshold: 0.15          # 15% = major wall (lowered from 25%)
  max_levels: 3                  # Max S/R levels to output
  
  # Wall strength calculation
  strength:
    distance_factor: 0.30        # Weight for distance from spot
    oi_factor: 0.70              # Weight for OI concentration

# ============================================================
# GAMMA EXPOSURE (GEX) - DTE Weighting
# ============================================================
# Gamma exposure weighting based on Days to Expiry (DTE)
# Theory: Gamma ∝ 1/√T, so gamma effect intensifies near expiry
gamma:
  # DTE weighting enables more accurate dealer hedging pressure estimates
  enable_dte_weighting: true
  
  # Reference DTE for normalization (7 days = baseline weight of 1.0)
  # This is the "standard" options expiry timeframe
  dte_reference_days: 7.0
  
  # Weight bounds to prevent extreme values
  max_dte_weight: 3.0            # Max weight for very short-dated (DTE < 2 days)
  min_dte_weight: 0.3            # Min weight for long-dated (DTE > 30 days)
  
  # GEX significance threshold (as % of total absolute GEX)
  significant_level_threshold: 0.05  # 5% of total GEX = significant level
  
  # Minimum OI to consider for GEX calculation
  min_oi_threshold: 10
  
  # Price range for gamma flip detection (% from spot)
  flip_search_range: 0.30        # ±30% from spot
  
  # DTE impact interpretation:
  # - DTE = 1 day  → weight ≈ 2.65 (high gamma, strong hedging pressure)
  # - DTE = 3 days → weight ≈ 1.53 (moderate gamma impact)
  # - DTE = 7 days → weight = 1.00 (baseline)
  # - DTE = 14 days → weight ≈ 0.71 (lower gamma impact)
  # - DTE = 30 days → weight ≈ 0.48 (minimal gamma impact)

# ============================================================
# OPTIONS ANALYSIS
# ============================================================
analysis:
  # IV Analysis
  iv:
    enabled: true
    weight: 0.18
    lookback_days: 30
    thresholds:
      high: 0.75
      low: 0.25
  
  # PCR Analysis
  pcr:
    enabled: true
    weight: 0.22
    thresholds:
      put_high: 1.2
      call_high: 0.8
    weighting:
      volume_weight: 0.6
      oi_weight: 0.4
  
  # Open Interest
  oi:
    enabled: true
    weight: 0.18
    concentration_threshold: 0.15
  
  # Max Pain
  max_pain:
    enabled: true
    weight: 0.12
    distance_threshold: 2.0
  
  # Sentiment (L/S Ratios + Funding Rate)
  sentiment:
    enabled: true
    weight: 0.18
  
  # Gamma Exposure (GEX)
  # DTE-weighted gamma exposure for dealer hedging pressure
  gamma:
    enabled: true
    weight: 0.12
    # Signal derived from GEX regime and gamma flip levels

# ============================================================
# FUTURES VALIDATION
# ============================================================
validation:
  liquidity:
    enabled: true
    min_24h_volume: 1000000      # Min $1M 24h volume
  
  trend:
    enabled: true
    ema_fast: 9
    ema_slow: 21
    require_alignment: true
  
  volatility:
    enabled: true
    atr_period: 14
    extreme_multiplier: 3.0
  
  funding:
    enabled: true
    max_absolute_rate: 0.001     # 0.1%

# ============================================================
# SIGNAL OUTPUT
# ============================================================
output:
  # JSON Output (Primary)
  json:
    enabled: true                # Output JSON to stdout
    pretty_print: false          # Compact JSON
    include_metadata: true
    include_selected_assets: true
  
  # Signal filtering
  signals:
    min_confidence: 0.30         # Lowered from 0.55 to allow more signals
    max_per_asset: 1
    max_per_execution: 5
    min_risk_reward: 1.5
  
  # S/R Levels
  sr_levels:
    max_levels: 3
    include_max_pain: true
    min_wall_strength: 0.50
  
  # Stop Loss
  stop_loss:
    method: "wall"
    wall_based:
      use_nearest_wall: true
      buffer_pct: 0.2
    min_distance_pct: 0.5
    max_distance_pct: 3.0
  
  # Take Profit
  take_profit:
    levels: 3
    ratios:
      level_1: 0.5
      level_2: 0.3
      level_3: 0.2
    wall_based:
      tp1: "nearest_wall"
      tp2: "second_wall"
      tp3: "third_wall"
  
  # Database (Secondary)
  database:
    enabled: true
    path: "./data/signals.db"
    rotation: "weekly"
    retention_weeks: 4

# ============================================================
# LOGGING
# ============================================================
logging:
  level: "INFO"
  format: "json"
  
  file:
    enabled: true
    path: "./logs/signal_generator.log"
    max_size_mb: 10
    backup_count: 5
  
  console:
    enabled: false               # Disable console (JSON to stdout)
    colorize: false
  
  mask_sensitive: true

# ============================================================
# NOTE: External Components
# ============================================================
# Scheduling: Handled externally via cronjob or task scheduler
# Example: */15 * * * * cd /path/to/project && ./venv/bin/python -m binance_signal_generator
#
# Notifications: Handled externally by reading JSON output
# Example: python -m binance_signal_generator | your_notification_script.sh
